<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pasifico Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e5e5e5;font-family:-apple-system,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login{background:#1a1a1a;padding:48px;border-radius:16px;width:380px;max-width:90vw;border:1px solid #2a2a2a}
.login h1{font-size:1.4rem;margin-bottom:4px;letter-spacing:-.02em}
.login p{color:#888;font-size:.85rem;margin-bottom:32px}
.login label{display:block;font-size:.75rem;color:#888;margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}
.login input{width:100%;padding:14px 16px;background:#111;border:1px solid #2a2a2a;border-radius:8px;color:#e5e5e5;font-size:.95rem;outline:none}
.login input:focus{border-color:#b8860b}
.login button{width:100%;padding:14px;background:#b8860b;border:0;border-radius:8px;color:#0d0d0d;font-weight:600;font-size:.95rem;cursor:pointer;margin-top:24px}
.login button:hover{background:#d4a017}
.login .error{color:#ff4444;font-size:.8rem;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="login">
  <h1>Pasifico CMS</h1>
  <p>Admin panel</p>
  <form id="loginForm">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" autofocus>
    <button type="submit">Sign in</button>
    <p class="error" id="error">Wrong password</p>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const pw = document.getElementById('password').value;
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ password: pw })
  });
  if (res.ok) {
    window.location.href = '/admin';
  } else {
    document.getElementById('error').style.display = 'block';
  }
});
</script>
</body>
</html>
