<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pasifico CMS · Admin</title>
<style>
/* ─── ROOT ─── */
:root{--bg:#0b0b0b;--s1:#131313;--s2:#1c1c1c;--s3:#262626;--b:#2e2e2e;--b2:#383838;--t:#eee;--m:#777;--l:#999;--g:#c8922d;--gh:#daa63e;--gd:#a6751a;--r:#d44;--font:system-ui,-apple-system,sans-serif;--mono:'SF Mono','Cascadia Code',monospace;--radius:10px;--transition:.2s ease}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--t);font-family:var(--font);font-size:13.5px;height:100%}
body{height:100%;display:flex;overflow:hidden}
a{color:var(--g);text-decoration:none}
a:hover{color:var(--gh)}
input,textarea,select,button{font:inherit;color:inherit}
::selection{background:var(--g);color:#000}

/* ─── LOGIN ─── */
.login{display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:radial-gradient(ellipse at 50% 30%,var(--s2),var(--bg))}.login-box{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:40px;width:360px;max-width:92vw;text-align:center}.login-box h1{font-size:1.3rem;letter-spacing:-.01em}.login-box h1 span{color:var(--g)}.login-box .sub{color:var(--m);font-size:.82rem;margin:6px 0 28px}.login-box input{width:100%;padding:13px 16px;background:#090909;border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:.9rem;outline:none;margin-bottom:14px;transition:border-color var(--transition)}.login-box input:focus{border-color:var(--g)}.login-box button{width:100%;padding:13px;background:var(--g);border:0;border-radius:8px;color:#000;font-weight:600;cursor:pointer;font-size:.85rem;transition:background var(--transition)}.login-box button:hover{background:var(--gh)}.login-box .err{color:var(--r);font-size:.78rem;display:none;margin-top:10px}

/* ─── LAYOUT ─── */
.sidebar{width:220px;min-width:220px;background:var(--s1);border-right:1px solid var(--b);display:flex;flex-direction:column;height:100%;overflow:hidden}.sidebar-brand{padding:18px 16px;border-bottom:1px solid var(--b)}.sidebar-brand h2{font-size:1rem;letter-spacing:-.01em}.sidebar-brand h2 span{color:var(--g)}.sidebar-brand small{font-size:.65rem;color:var(--m);display:block;margin-top:1px}.sidebar-nav{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:1px}.sidebar-nav .tab-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;background:none;border:0;border-radius:8px;color:var(--m);cursor:pointer;font-size:.82rem;text-align:left;transition:all var(--transition);width:100%;font-weight:450}.sidebar-nav .tab-btn:hover{color:var(--t);background:var(--s2)}.sidebar-nav .tab-btn.active{color:var(--t);background:var(--s2);font-weight:500}.sidebar-nav .tab-btn .ico{width:20px;text-align:center;font-size:1rem}.sidebar-ai{position:relative}.sidebar-ai .tab-btn{background:linear-gradient(135deg,var(--s2),var(--s1));border:1px solid var(--b);margin:4px 6px;width:calc(100% - 12px);border-radius:8px}.sidebar-ai .tab-btn.active{border-color:var(--g)}.sidebar-ai .indicator{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:auto}.sidebar-ai .indicator.on{background:#4caf50;box-shadow:0 0 6px #4caf5066}.sidebar-ai .indicator.off{background:var(--m)}.sidebar-foot{padding:10px 12px;border-top:1px solid var(--b);display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--m)}.sidebar-foot .logout-btn{padding:4px 10px;background:transparent;border:1px solid var(--b);border-radius:5px;color:var(--m);cursor:pointer;font-size:.7rem;margin-left:auto;transition:all var(--transition)}.sidebar-foot .logout-btn:hover{border-color:var(--r);color:var(--r)}
.lang-tabs{display:flex;gap:3px;padding:6px 12px;border-bottom:1px solid var(--b);background:var(--s1)}.lang-tab{padding:5px 12px;border:1px solid transparent;border-radius:5px;background:none;cursor:pointer;font-size:.7rem;font-weight:600;text-transform:uppercase;color:var(--m);transition:all var(--transition);letter-spacing:.03em}.lang-tab.active{color:var(--g);border-color:var(--g);background:rgba(200,146,45,.08)}.lang-tab:hover:not(.active){color:var(--t);border-color:var(--b2)}

/* ─── MAIN ─── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--b);background:var(--s1);min-height:52px;flex-shrink:0}.main-header h3{font-size:.95rem;font-weight:500}.main-header .actions{display:flex;gap:8px;align-items:center}.main-content{flex:1;overflow-y:auto;padding:20px}

/* ─── CARDS ─── */
.card{background:var(--s1);border:1px solid var(--b);border-radius:var(--radius);padding:18px;margin-bottom:14px}.card h4{font-size:.85rem;font-weight:500;color:var(--g);margin-bottom:12px;display:flex;align-items:center;gap:8px}.card h4 .count{font-size:.7rem;color:var(--m);font-weight:400}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
label{display:block;font-size:.66rem;color:var(--m);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}
input,textarea,select{width:100%;padding:9px 11px;background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t);font-size:.83rem;outline:none;transition:border-color var(--transition)}textarea{resize:vertical;min-height:42px;font-family:var(--font)}input:focus,textarea:focus,select:focus{border-color:var(--g)}select{appearance:auto;cursor:pointer}select option{background:var(--s1)}

/* ─── BUTTONS ─── */
.btn{padding:8px 16px;border:0;border-radius:6px;font-size:.8rem;cursor:pointer;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all var(--transition);white-space:nowrap}.btn-primary{background:var(--g);color:#000}.btn-primary:hover{background:var(--gh)}.btn-secondary{background:var(--s2);color:var(--t);border:1px solid var(--b)}.btn-secondary:hover{background:var(--s3)}.btn-success{background:#2e7d32;color:#fff}.btn-success:hover{background:#388e3c}.btn-danger{background:transparent;color:var(--r);border:1px solid var(--r)}.btn-danger:hover{background:var(--r);color:#000}.btn-sm{padding:5px 10px;font-size:.72rem}.btn-lg{padding:10px 24px;font-size:.85rem}.btn-icon{padding:6px 8px;font-size:.85rem;border-radius:5px}.btn-ghost{background:transparent;border:0;color:var(--m);padding:4px 6px;cursor:pointer;transition:color var(--transition)}.btn-ghost:hover{color:var(--t)}

/* ─── ITEMS ─── */
.items{display:flex;flex-direction:column;gap:6px}.item{display:flex;gap:10px;align-items:center;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:10px 12px;transition:border-color var(--transition)}.item:hover{border-color:var(--b2)}.item .thumb{width:44px;height:36px;border-radius:5px;object-fit:cover;background:var(--s3);flex-shrink:0}.item .info{flex:1;min-width:0}.item .info .name{font-size:.83rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.item .info .sub{font-size:.7rem;color:var(--m)}.item .info .sub .price{color:var(--g)}.item .actions{flex-shrink:0;display:flex;gap:4px}

/* ─── STATS ─── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}.stat{background:var(--s1);border:1px solid var(--b);border-radius:var(--radius);padding:16px}.stat .n{font-size:1.6rem;font-weight:700;color:var(--g);line-height:1.2}.stat .l{font-size:.7rem;color:var(--m);margin-top:2px}.stat .d{font-size:.6rem;color:var(--l);margin-top:6px}

/* ─── MODAL ─── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}.modal.open{display:flex}.modal-box{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:24px;width:92vw;max-width:820px;max-height:88vh;overflow-y:auto}.modal-box h3{font-size:1rem;margin-bottom:16px;display:flex;align-items:center;gap:10px}.modal-close{background:none;border:0;color:var(--m);font-size:1.2rem;cursor:pointer;padding:0 4px;margin-left:auto}.modal-close:hover{color:var(--t)}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--g);color:#000;border-radius:8px;font-size:.8rem;z-index:999;display:none;animation:slideUp .25s ease;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.5)}.toast.err{background:var(--r);color:#fff}.toast.info{background:var(--s2);color:var(--t);border:1px solid var(--b)}@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ─── IMAGE PREVIEW ─── */
.img-preview{width:44px;height:34px;border-radius:4px;object-fit:cover;background:var(--s3);flex-shrink:0}.img-med{width:120px;height:80px;border-radius:6px;object-fit:cover;background:var(--s3);border:1px solid var(--b)}.flex{display:flex;gap:10px;align-items:center}.flex-wrap{flex-wrap:wrap}.gap-4{gap:4px}.gap-8{gap:8px}.gap-12{gap:12px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}

/* ─── I18N EDITOR ─── */
.i18n-row{border-bottom:1px solid var(--b);padding:8px 0}.i18n-row:last-child{border-bottom:0}.i18n-key{font-size:.7rem;color:var(--l);font-family:var(--mono);margin-bottom:4px;word-break:break-all}.i18n-inps{display:grid;grid-template-columns:1fr 1fr;gap:6px}.i18n-inps .fi{display:flex;flex-direction:column}.i18n-inps .fi .ltag{font-size:.55rem;font-weight:600;margin-bottom:2px}.ltag.en{color:#7dd3fc}.ltag.tr{color:#fca5a5}.ltag.az{color:#86efac}.ltag.ru{color:#fcd34d}

/* ─── SEARCH ─── */
.search-wrap{position:relative;margin-bottom:12px}.search-wrap input{padding-left:32px}.search-wrap .ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--m);font-size:.78rem;pointer-events:none}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:40px 20px;color:var(--m);font-size:.85rem}.empty .big{font-size:2rem;display:block;margin-bottom:8px}

/* ─── DROPZONE ─── */
.dropzone{border:2px dashed var(--b);border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:all var(--transition);margin-bottom:10px}.dropzone:hover,.dropzone.dragover{border-color:var(--g);background:rgba(200,146,45,.05)}.dropzone p{font-size:.8rem;color:var(--m)}.dropzone .ico{font-size:2rem;display:block;margin-bottom:6px}

/* ─── AI PANEL ─── */
.ai-panel{width:380px;min-width:380px;background:var(--s1);border-left:1px solid var(--b);display:none;flex-direction:column;height:100%}.ai-panel.open{display:flex}.ai-header{padding:12px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}.ai-header h4{font-size:.82rem;font-weight:500;display:flex;align-items:center;gap:6px}.ai-header h4 .dot{width:6px;height:6px;border-radius:50%;background:#4caf50}.ai-close{background:none;border:0;color:var(--m);font-size:1.1rem;cursor:pointer;padding:2px 6px;border-radius:4px}.ai-close:hover{background:var(--s2);color:var(--t)}.ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}.ai-msg{max-width:88%;padding:10px 13px;border-radius:10px;font-size:.8rem;line-height:1.5;white-space:pre-wrap;word-break:break-word}.ai-msg.bot{background:var(--s2);border:1px solid var(--b);align-self:flex-start;border-bottom-left-radius:3px}.ai-msg.user{background:rgba(200,146,45,.12);border:1px solid rgba(200,146,45,.18);align-self:flex-end;border-bottom-right-radius:3px;color:var(--t)}.ai-msg .think{font-size:.72rem;color:var(--l);font-style:italic;display:block;margin-bottom:6px;opacity:.7;border-left:2px solid var(--g);padding-left:8px}.ai-msg .err{color:var(--r);font-size:.75rem}.ai-typing{display:flex;gap:4px;padding:6px 0;align-items:center;color:var(--m)}.ai-typing span{width:5px;height:5px;border-radius:50%;background:var(--m);animation:aiDots 1s infinite}.ai-typing span:nth-child(2){animation-delay:.15s}.ai-typing span:nth-child(3){animation-delay:.3s}@keyframes aiDots{0%,80%,100%{opacity:.3}40%{opacity:1}}.ai-foot{padding:10px 12px;border-top:1px solid var(--b);display:flex;gap:8px;align-items:end}.ai-foot textarea{flex:1;padding:9px 11px;background:var(--s2);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:.8rem;resize:none;min-height:36px;max-height:96px;outline:none;transition:border-color var(--transition)}.ai-foot textarea:focus{border-color:var(--g)}.ai-foot .ai-send{padding:8px 14px;background:var(--g);color:#000;border:0;border-radius:7px;cursor:pointer;font-size:.85rem;transition:background var(--transition);align-self:end}.ai-foot .ai-send:hover{background:var(--gh)}.ai-tools{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 8px;border-bottom:1px solid var(--b)}.ai-tools button{font-size:.65rem;padding:4px 8px;border:1px solid var(--b);border-radius:4px;background:transparent;color:var(--m);cursor:pointer;transition:all var(--transition)}.ai-tools button:hover{color:var(--t);border-color:var(--g)}
.ai-image-preview{max-width:200px;max-height:120px;border-radius:6px;object-fit:cover;margin-top:6px;border:1px solid var(--b)}

/* ─── CHATBOT KNOWLEDGE ─── */
.knowledge-list{display:flex;flex-direction:column;gap:10px}.knowledge-card{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:14px;transition:border-color var(--transition)}.knowledge-card:hover{border-color:var(--b2)}.knowledge-card label{font-size:.66rem;color:var(--m);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:500;display:block}.knowledge-card input,.knowledge-card textarea{width:100%;padding:9px 11px;background:var(--s1);border:1px solid var(--b);border-radius:6px;color:var(--t);font-size:.83rem;outline:none;transition:border-color var(--transition);margin-bottom:10px}.knowledge-card input:focus,.knowledge-card textarea:focus{border-color:var(--g)}.knowledge-card textarea{resize:vertical;min-height:80px;font-family:var(--font)}.knowledge-card .card-actions{display:flex;justify-content:flex-end;gap:6px}.knowledge-card .card-id{font-size:.6rem;color:var(--m);font-family:var(--mono);margin-bottom:6px}

/* ─── RESPONSIVE ─── */
@media(max-width:960px){.sidebar{width:56px;min-width:56px}.sidebar-brand{padding:12px 10px}.sidebar-brand h2{font-size:0}.sidebar-brand h2:after{content:"P";font-size:1.1rem;color:var(--g)}.sidebar-brand small{display:none}.sidebar-nav .tab-btn{padding:10px 8px;justify-content:center}.sidebar-nav .tab-btn span{display:none}.sidebar-nav .tab-btn .ico{margin:0}.ai-panel{position:fixed;right:0;top:0;z-index:150;width:100%;max-width:400px;box-shadow:-8px 0 32px rgba(0,0,0,.6)}.lang-tabs{padding:4px 8px;gap:2px}.lang-tab{padding:4px 8px;font-size:.65rem}}
@media(max-width:640px){.row,.row-3,.row-4,.i18n-inps{grid-template-columns:1fr}.main-content{padding:12px}.stats{grid-template-columns:1fr 1fr}.modal-box{padding:16px}.ai-panel{max-width:100%}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginView">
  <div class="login-box">
    <h1>Pasifico <span>CMS</span></h1>
    <p class="sub">Admin panel · v2</p>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()" id="loginBtn">Sign in</button>
    <p class="err" id="loginErr">Wrong password</p>
  </div>
</div>

<!-- ADMIN -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <h2>Pasifico <span>CMS</span></h2>
    <small>v2 · content manager</small>
  </div>
  <div class="sidebar-nav" id="sidebarNav">
    <button class="tab-btn active" data-tab="dash"><span class="ico">📊</span> <span>Dashboard</span></button>
    <button class="tab-btn" data-tab="menu"><span class="ico">🍣</span> <span>Menu</span></button>
    <button class="tab-btn" data-tab="featured"><span class="ico">⭐</span> <span>Featured</span></button>
    <button class="tab-btn" data-tab="events"><span class="ico">🎭</span> <span>Events</span></button>
    <button class="tab-btn" data-tab="texts"><span class="ico">📝</span> <span>Translations</span></button>
    <button class="tab-btn" data-tab="forms"><span class="ico">📋</span> <span>Form Options</span></button>
    <button class="tab-btn" data-tab="site"><span class="ico">⚙️</span> <span>Site</span></button>
    <button class="tab-btn" data-tab="chatbot-knowledge"><span class="ico">🧠</span> <span>Chatbot Knowledge</span></button>
    <div class="sidebar-ai">
      <button class="tab-btn" data-tab="ai" id="aiTabBtn"><span class="ico">🤖</span> <span>AI Assistant</span><span class="indicator off" id="aiIndicator"></span></button>
    </div>
  </div>
  <div class="sidebar-foot">
    <span id="langLabel">EN</span>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</div>

<!-- LANG TABS -->
<div class="lang-tabs" id="langTabs">
  <button class="lang-tab active" data-lang="en">EN</button>
  <button class="lang-tab" data-lang="tr">TR</button>
  <button class="lang-tab" data-lang="az">AZ</button>
  <button class="lang-tab" data-lang="ru">RU</button>
</div>

<div class="main" id="mainArea">
  <div class="main-header">
    <h3 id="pageTitle">Dashboard</h3>
    <div class="actions" id="headerActions"></div>
  </div>
  <div class="main-content" id="content"></div>
</div>

<!-- AI PANEL -->
<div class="ai-panel" id="aiPanel">
  <div class="ai-header">
    <h4><span class="dot"></span> AI Assistant · pasifico-admin</h4>
    <button class="ai-close" onclick="toggleAiPanel()">✕</button>
  </div>
  <div class="ai-tools" id="aiTools">
    <button onclick="aiToolAction('help')">💡 Help</button>
    <button onclick="aiToolAction('dash')">📊 Dashboard</button>
    <button onclick="aiToolAction('edit')">✏️ Suggest edit</button>
    <button onclick="aiToolAction('search')">🔍 Web search</button>
    <button onclick="uploadAiImage()">🖼️ Upload image</button>
    <button onclick="recordAiAudio()">🎤 Voice</button>
  </div>
  <div class="ai-messages" id="aiMessages">
    <div class="ai-msg bot">Hello! I'm Pasifico Admin AI. How can I help you manage the site?<br><br><small style="color:var(--m)">I can help edit content, search the web, process images, and more. Use the buttons above or just type.</small></div>
  </div>
  <div class="ai-foot">
    <input type="file" id="aiImageInput" accept="image/*" style="display:none" onchange="handleAiImage(this)">
    <textarea id="aiInput" placeholder="Ask me anything..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAi()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,96)+'px'"></textarea>
    <button class="ai-send" onclick="sendAi()">➤</button>
  </div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modalBody"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
// STATE & CONSTANTS
// ════════════════════════════════════════════
const LANGS = ['en','tr','az','ru'];
const LL = {en:'EN',tr:'TR',az:'AZ',ru:'RU'};
let editorLang = 'en';
let bulkCache = null;
let _menuData = null, _cats = null;

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function $(id){return document.getElementById(id)}
function q(s){return document.querySelector(s)}
function qa(s){return document.querySelectorAll(s)}

function toast(msg, type='ok'){
  const t=$('toast');
  t.textContent=msg;
  t.className='toast'+(type==='err'?' err':type==='info'?' info':'');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.display='none',2800);
  t.style.display='block';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function closeModal(){$('modal').classList.remove('open')}
function openModal(h){$('modalBody').innerHTML=h;$('modal').classList.add('open')}

async function api(path,opts={}){
  const r=await fetch(path,{headers:{'Content-Type':'application/json',...opts.headers},...opts});
  if(r.status===401){location.reload();throw new Error('Auth')}
  if(!r.ok){let e;try{e=await r.json()}catch{e={}}throw new Error(e.error||'Error '+r.status)}
  return r.json()
}

function loadData(n){
  if(bulkCache && bulkCache[n]) return Promise.resolve(bulkCache[n]);
  return api('/api/data/'+n).then(d=>{if(!bulkCache)bulkCache={};return d})
}
async function saveData(n,d){return api('/api/admin/data/'+n,{method:'PUT',body:JSON.stringify(d)})}

function lc(s){return String(s||'').toLowerCase()}
function renderLangs(){return LANGS.map(l=>`<span class="ltag ${l}" style="font-size:.55rem;font-weight:600;margin-right:2px">${LL[l]}</span>`).join('')}

// ════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════
async function login(){
  try{
    $('loginBtn').textContent='Signing in...';
    await api('/api/login',{method:'POST',body:JSON.stringify({password:$('pw').value})});
    $('loginView').style.display='none';
    init();

  $('content').innerHTML = `
    <div class="card">
      <h4>Contact</h4>
      <div class="row">
        <div><label>Phone</label><input id="s_phone" value="${esc(site.phone)}"></div>
        <div><label>Email</label><input id="s_email" value="${esc(site.email)}"></div>
      </div>
    </div>
    <div class="card">
      <h4>Address</h4>
      <div class="row">${LANGS.map(l=>`<div><label><span class="ltag ${l}">${LL[l]}</span></label><input id="s_addr_${l}" value="${esc(site.address?.[l]||'')}"></div>`).join('')}</div>
    </div>
    <div class="card">
      <h4>Hours</h4>
      <div class="row">${LANGS.map(l=>`<div><label><span class="ltag ${l}">${LL[l]}</span></label><textarea id="s_hours_${l}" rows="3">${esc(site.hours?.[l]||'')}</textarea></div>`).join('')}</div>
    </div>
    <div class="card">
      <h4>Social Links</h4>
      <div class="row">${Object.entries(site.social||{}).map(([k,v])=>`<div><label>${k}</label><input id="s_social_${k}" value="${esc(v)}"></div>`).join('')}</div>
    </div>
    <div class="card">
      <h4>Hero Video</h4>
      <div class="flex"><input id="s_video" value="${esc(site.heroVideo||'')}" style="flex:1"><button class="btn btn-secondary btn-sm" onclick="testVideo()">Test</button></div>
    </div>
    <button class="btn btn-primary mt-8" onclick="saveSite()">💾 Save Site Config</button>
  `;
};
window.testVideo = function(){const url=$('s_video').value;if(url)window.open(url,'_blank')};
window.saveSite = async function(){
  const site = await loadData('site');
  site.phone=$('s_phone').value;site.email=$('s_email').value;
  site.address={};site.hours={};
  LANGS.forEach(l=>{site.address[l]=$('s_addr_'+l).value;site.hours[l]=$('s_hours_'+l).value});
  if(site.social)Object.keys(site.social).forEach(k=>site.social[k]=$('s_social_'+k).value);
  site.heroVideo=$('s_video').value;
  await saveData('site', site);
  toast('Site config saved!');
};

// ─── CHATBOT KNOWLEDGE ───
renderers['chatbot-knowledge'] = async function(){
  const data = await loadData('chatbot-knowledge');
  const items = Array.isArray(data) ? data : [];

  function renderKnowledge(){
    $('content').innerHTML = `
      <div class="card">
        <h4>🧠 Knowledge Base <span class="count">${items.length} cards</span></h4>
        <div class="knowledge-list" id="knowledgeList">
          ${items.length ? items.map((item, i) => `
            <div class="knowledge-card" data-idx="${i}">
              <div class="card-id">${esc(item.id||'')}</div>
              <label>Title</label>
              <input class="kb-title" value="${esc(item.title||'')}" placeholder="Enter title...">
              <label>Content</label>
              <textarea class="kb-content" rows="4" placeholder="Enter knowledge content...">${esc(item.content||'')}</textarea>
              <div class="card-actions">
                <button class="btn btn-danger btn-sm" onclick="deleteKnowledgeCard(${i})">🗑️ Delete</button>
              </div>
            </div>
          `).join('') : '<div class="empty"><span class="big">🧠</span>No knowledge cards yet. Click "+ Add Knowledge" to get started.</div>'}
        </div>
        <div class="flex gap-8 mt-12">
          <button class="btn btn-primary btn-sm" onclick="addKnowledgeCard()">+ Add Knowledge</button>
          <button class="btn btn-success btn-sm" onclick="saveKnowledge()">💾 Save</button>
        </div>
      </div>`;
  }

  window._knowledgeItems = items;
  renderKnowledge();
};

window.addKnowledgeCard = function(){
  const items = window._knowledgeItems || [];
  const id = 'kb-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
  items.push({id, title: '', content: ''});
  window._knowledgeItems = items;

  // Re-render the knowledge list by appending the new card
  const list = $('knowledgeList');
  const idx = items.length - 1;
  const cardHtml = `
    <div class="knowledge-card" data-idx="${idx}">
      <div class="card-id">${esc(id)}</div>
      <label>Title</label>
      <input class="kb-title" value="" placeholder="Enter title...">
      <label>Content</label>
      <textarea class="kb-content" rows="4" placeholder="Enter knowledge content..."></textarea>
      <div class="card-actions">
        <button class="btn btn-danger btn-sm" onclick="deleteKnowledgeCard(${idx})">🗑️ Delete</button>
      </div>
    </div>`;

  if (list) {
    // Replace empty state if needed
    const emptyEl = list.querySelector('.empty');
    if (emptyEl) {
      list.innerHTML = cardHtml;
    } else {
      list.insertAdjacentHTML('beforeend', cardHtml);
    }
    // Update count
    const countEl = document.querySelector('.card h4 .count');
    if (countEl) countEl.textContent = `${items.length} cards`;
  } else {
    // Full re-render if list element not found
    renderers['chatbot-knowledge']();
  }
  toast('Knowledge card added');
};

window.deleteKnowledgeCard = function(idx){
  const items = window._knowledgeItems || [];
  if (idx < 0 || idx >= items.length) return;
  if (!confirm('Delete this knowledge card?')) return;
  items.splice(idx, 1);
  window._knowledgeItems = items;
  renderers['chatbot-knowledge']();
  toast('Knowledge card deleted');
};

window.saveKnowledge = async function(){
  const items = window._knowledgeItems || [];

  // Read values from the DOM
  const cards = document.querySelectorAll('.knowledge-card');
  cards.forEach((card, i) => {
    const titleInput = card.querySelector('.kb-title');
    const contentTextarea = card.querySelector('.kb-content');
    if (i < items.length) {
      items[i].title = titleInput ? titleInput.value : '';
      items[i].content = contentTextarea ? contentTextarea.value : '';
    }
  });

  // Remove empty IDs before saving (let server assign if needed)
  const clean = items.filter(item => item.title || item.content);

  try {
    await saveData('chatbot-knowledge', clean);
    window._knowledgeItems = clean;
    toast('Knowledge base saved!');
  } catch(e) {
    toast('Save failed: ' + e.message, 'err');
  }
};

// ════════════════════════════════════════════
// AI ASSISTANT (pasifico-admin)
// ════════════════════════════════════════════
let aiOpen = false;
let aiMessages = [];
const AI_MODEL = 'pasifico-admin';

function toggleAiPanel(open){
  aiOpen = open!==undefined?open:!aiOpen;
  $('aiPanel').classList.toggle('open',aiOpen);
  $('aiIndicator').className='indicator '+(aiOpen?'on':'off');
  if(!aiOpen)qa('.tab-btn').forEach(t=>{if(t.dataset.tab==='ai')t.classList.remove('active')});
  else setTimeout(()=>{$('aiInput').focus()},200);
}

async function sendAi(){
  const input=$('aiInput');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  input.style.height='auto';

  addAiMsg(text,'user');
  aiMessages.push({role:'user',content:text});

  const msgDiv=addAiMsg('','bot',true);
  msgDiv.innerHTML='<div class="ai-typing">Thinking<span>.</span><span>.</span><span>.</span></div>';

  try{
    const res=await fetch('/api/ai/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:AI_MODEL,
        messages:getAiSystemPrompt().concat(aiMessages.slice(-20)),
        stream:false
      })
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||'No response';
    msgDiv.innerHTML=formatAiReply(reply);
    aiMessages.push({role:'assistant',content:reply});
  }catch(e){
    msgDiv.innerHTML=`<div class="err">⚠️ ${esc(e.message)}</div>`;
  }
  scrollAi();
}

function addAiMsg(text,role,typing=false){
  const div=document.createElement('div');
  div.className='ai-msg '+role;
  if(typing)div.id='aiTypingMsg';
  else if(text)div.textContent=text;
  $('aiMessages').appendChild(div);
  return div;
}

function formatAiReply(text){
  let think='';
  let reply=text;

  const thinkMatch=text.match(/<think>([\s\S]*?)<\/think>/);
  if(thinkMatch){
    think=thinkMatch[1].trim();
    reply=text.replace(/<think>[\s\S]*?<\/think>/,'').trim();
  }

  let html='';
  if(think){
    html+=`<span class="think">💭 ${esc(think)}</span>`;
  }
  html+=esc(reply).replace(/\n/g,'<br>');
  return html;
}

function scrollAi(){
  const c=$('aiMessages');
  c.scrollTop=c.scrollHeight;
}

function getAiSystemPrompt(){
  return [
    {role:'system',content:`You are Pasifico Admin AI, an AI assistant embedded in the Pasifico Lounge & Dining CMS admin panel.

You help the restaurant owner manage their website content. You can:
1. Answer questions about the CMS and how to use it
2. Search the web for information (menu ideas, translation help, etc.)
3. Suggest edits to the site content based on user requests
4. Process images (you can receive image uploads)
5. Record audio notes from voice input

CRITICAL RULES:
- Always respond in the user's language (Turkish, English, Azerbaijani, or Russian)
- NEVER wrap your responses in any quotes, markers, or special formatting
- Before performing any action, briefly state what you're doing (thinking cloud)
- After completing the action, hide the thinking and show only the final response
- You have NO language restrictions - speak naturally in the user's language
- When suggesting edits, clearly state what changes you recommend
- Web searches require user approval before making any changes
- Be concise and helpful

Use these tools when needed:
- Current site data is accessible via fetch('/api/bulk-data')
- To search the web, the user can press the "Web search" button
- Image uploads use the built-in upload button

The admin panel has these tabs: Dashboard, Menu, Featured, Events, Translations, Form Options, Site, Chatbot Knowledge, and this AI Assistant.

The site uses 4 languages: English (en), Turkish (tr), Azerbaijani (az), Russian (ru).
All content is stored as JSON files and managed through the admin panel.`}
  ];
}

window.aiToolAction = async function(action){
  const input=$('aiInput');
  switch(action){
    case 'help':
      input.value='What can you help me with in the admin panel?';
      break;
    case 'dash':
      input.value='Show me a summary of the current site content';
      break;
    case 'edit':
      input.value='I want to suggest an edit to the site. Can you help?';
      break;
    case 'search':
      input.value='Search the web for me: ';
      break;
  }
  sendAi();
};

window.uploadAiImage = function(){
  $('aiImageInput').click();
};

window.handleAiImage = function(input){
  if(!input.files[0])return;
  const reader=new FileReader();
  reader.onload=function(e){
    const imgDiv=document.createElement('div');
    imgDiv.className='ai-msg user';
    imgDiv.innerHTML=`<div>📷 Image uploaded:</div><img class="ai-image-preview" src="${e.target.result}">`;
    $('aiMessages').appendChild(imgDiv);
    scrollAi();
    aiMessages.push({role:'user',content:'[Uploaded an image for review/processing]'});

    // Auto-analyze
    setTimeout(()=>{
      const msgDiv=addAiMsg('','bot',true);
      msgDiv.innerHTML='<div class="ai-typing">Analyzing image<span>.</span><span>.</span><span>.</span></div>';
      setTimeout(()=>{
        msgDiv.innerHTML=formatAiReply('I received your image. What would you like me to do with it? I can help describe it, suggest if it works for the site, or guide you on uploading it to the server.');
        aiMessages.push({role:'assistant',content:''});
        scrollAi();
      },800);
    },300);
  };
  reader.readAsDataURL(input.files[0]);
};

window.recordAiAudio = function(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    toast('Voice input not supported in this browser','err');
    return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rec=new SR();
  rec.lang='auto';
  rec.continuous=false;
  rec.interimResults=false;
  rec.onresult=function(e){
    $('aiInput').value=e.results[0][0].transcript;
    sendAi();
  };
  rec.onerror=function(e){
    toast('Voice error: '+e.error,'err');
  };
  toast('🎤 Listening...','info');
  rec.start();
  setTimeout(()=>{try{rec.stop()}catch{}},8000);
};

// INIT
// ════════════════════════════════════════════
function init(){
  qa('.lang-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      qa('.lang-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      editorLang=tab.dataset.lang;
      $('langLabel').textContent=LL[editorLang];
      const active=document.querySelector('.tab-btn.active');
      if(active&&active.dataset.tab!=='ai')switchTab(active.dataset.tab);
    });
  });

  qa('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      switchTab(btn.dataset.tab);
    });
  });

  document.addEventListener('keydown',e=>{
    if(e.ctrlKey&&e.key==='Enter'&&document.activeElement===$('aiInput')){e.preventDefault();sendAi()}
    if(e.key==='Escape'){closeModal();if(aiOpen)toggleAiPanel(false)}
  });

  switchTab('dash');
}

(function(){
  fetch('/api/check-auth').then(r=>r.json()).then(d=>{
    if(d.authenticated){
      $('loginView').style.display='none';
      init();
    }
  }).catch(()=>{});
})();
