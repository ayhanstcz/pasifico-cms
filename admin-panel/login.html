<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#0e0e0e;color:#eee;font-family:-apple-system,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#181818;border:1px solid #2c2c2c;border-radius:16px;padding:40px;width:360px;max-width:94vw}
.box h1{font-size:1.2rem;margin-bottom:4px}.box .sub{color:#777;font-size:.82rem;margin-bottom:28px}
.box input{width:100%;padding:14px 16px;background:#0a0a0a;border:1px solid #2c2c2c;border-radius:8px;color:#eee;font-size:.9rem;outline:none;margin-bottom:16px}
.box input:focus{border-color:#b8860b}.box button{width:100%;padding:14px;background:#b8860b;border:0;border-radius:8px;color:#0e0e0e;font-weight:600;cursor:pointer}
.box button:hover{background:#d4a017}.box .err{color:#f44;font-size:.78rem;display:none;margin-top:10px}
</style></head>
<body>
<div class="box">
  <h1>Pasifico CMS</h1>
  <p class="sub">Admin panel</p>
  <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">Sign in</button>
  <p class="err" id="err">Wrong password</p>
</div>
<script>
async function login(){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})});
  if(r.ok)window.location.href='/admin';else document.getElementById('err').style.display='block';
}
</script>
</body>
</html>
